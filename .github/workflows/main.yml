name: AI-QE-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Playwright browsers for the Linux runner
          playwright install --with-deps chromium

      - name: 🧪 Run Self-Healing AI Tests
        env:
          # Injecting secrets from GitHub Settings
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}
          BASE_URL: https://www.saucedemo.com/
        run: |
          # Running the new stable test file
          pytest tests/test_ai_playwright.py -v -s --html=report.html --self-contained-html

      - name: 📊 Archive Production Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report-html
          path: report.html