name: AI-QE-Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio  # Ensuring the engine is there

      - name: 🧪 Run Unified AI Tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pytest tests/test_unified_flow.py -v --html=report.html --self-contained-html

      - name: 📊 Archive Production Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report-html
          path: report.html